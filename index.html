<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serag Tube - مكتبة الفيديوهات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060d1a;
  --surface: #0d1b2e;
  --surface2: #13243d;
  --card: #0f1f35;
  --card-hover: #162a47;
  --accent: #00c8e0;
  --accent2: #0095a8;
  --accent-glow: rgba(0,200,224,0.25);
  --accent-soft: rgba(0,200,224,0.1);
  --text: #e4edf8;
  --text-muted: #6b88a8;
  --text-dim: #a8c0d8;
  --border: #1a3050;
  --border-accent: rgba(0,200,224,0.5);
  --live: #ff3e3e;
  --gold: #f5c518;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --radius: 14px;
  --font: 'Cairo', sans-serif;
  transition: background 0.4s, color 0.4s;
}

[data-theme="light"] {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #e8eef5;
  --card: #ffffff;
  --card-hover: #f5f9ff;
  --text: #0d1b2e;
  --text-muted: #5a7a9a;
  --text-dim: #4a6a8a;
  --border: #cad8e8;
  --border-accent: rgba(0,150,168,0.5);
  --accent-soft: rgba(0,150,168,0.08);
  --shadow: 0 8px 32px rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 900;
  background: rgba(6,13,26,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-accent);
  padding: 0.9rem 2rem;
  box-shadow: 0 4px 24px rgba(0,200,224,0.08);
}

[data-theme="light"] nav {
  background: rgba(255,255,255,0.9);
}

.nav-inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap;
}

.logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 2rem; letter-spacing: 2px;
  color: var(--accent);
  text-decoration: none;
  text-shadow: 0 0 20px var(--accent-glow);
  white-space: nowrap;
  flex-shrink: 0;
}

.logo span { color: var(--text); }

.search-wrap {
  flex: 1; min-width: 200px; max-width: 480px;
  position: relative;
}

.search-wrap svg {
  position: absolute; left: 1rem; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  color: var(--accent); pointer-events: none;
}

#searchInput {
  width: 100%; padding: 0.75rem 1rem 0.75rem 2.8rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: var(--font); font-size: 0.92rem;
  transition: all 0.3s;
}

#searchInput::placeholder { color: var(--text-muted); }
#searchInput:focus {
  outline: none; border-color: var(--accent);
  background: var(--card-hover);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.nav-actions { display: flex; gap: 0.6rem; align-items: center; margin-right: auto; }

.icon-btn {
  width: 40px; height: 40px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text-muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.25s; font-size: 1.1rem;
  position: relative;
}

.icon-btn:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
}

.icon-btn.active { color: var(--gold); border-color: var(--gold); background: rgba(245,197,24,0.1); }

.scroll-top-btn {
  padding: 0.55rem 1.1rem;
  background: var(--accent); border: none;
  border-radius: 10px; color: #060d1a;
  font-family: var(--font); font-weight: 700; font-size: 0.85rem;
  cursor: pointer; transition: all 0.3s;
  display: none; align-items: center; gap: 0.4rem;
}

.scroll-top-btn:hover { background: #33d4e8; transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

/* ── HERO ── */
.hero {
  padding: 5rem 2rem 4rem;
  background: linear-gradient(160deg, var(--bg) 0%, #0a1f38 60%, var(--bg) 100%);
  text-align: center; position: relative; overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(0,200,224,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-grid-lines {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  opacity: 0.08;
}

.hero-grid-lines::before, .hero-grid-lines::after {
  content: '';
  position: absolute;
  background: var(--accent);
}

.hero-grid-lines::before { width: 1px; height: 100%; left: 30%; top: 0; }
.hero-grid-lines::after  { width: 1px; height: 100%; right: 30%; top: 0; }

.hero-badge {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: var(--accent-soft); border: 1px solid var(--border-accent);
  border-radius: 20px; padding: 0.35rem 1rem;
  font-size: 0.8rem; color: var(--accent); font-weight: 600;
  margin-bottom: 1.5rem; letter-spacing: 0.5px;
  animation: fadeSlideDown 0.7s ease both;
}

.hero h1 {
  font-family: 'Cairo', sans-serif; font-weight: 900;
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: var(--text); line-height: 1.15;
  margin-bottom: 1rem;
  animation: fadeSlideDown 0.7s 0.1s ease both;
}

.hero h1 em { color: var(--accent); font-style: normal; }

.hero p {
  font-size: 1.1rem; color: var(--text-muted);
  animation: fadeSlideUp 0.7s 0.2s ease both;
}

.stats-row {
  display: flex; justify-content: center; gap: 2.5rem;
  margin-top: 2.5rem;
  animation: fadeSlideUp 0.7s 0.3s ease both;
}

.stat { text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 900; color: var(--accent); line-height: 1; }
.stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.2rem; }

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── RECENTLY WATCHED ── */
.recently-watched {
  max-width: 1440px; margin: 2rem auto;
  padding: 0 2rem;
}

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.2rem;
}

.section-title {
  font-size: 1.15rem; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 0.6rem;
}

.section-title .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}

.clear-btn {
  font-size: 0.78rem; color: var(--text-muted);
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 0.3rem 0.7rem;
  cursor: pointer; font-family: var(--font);
  transition: all 0.2s;
}

.clear-btn:hover { color: var(--live); border-color: var(--live); }

.recent-scroll {
  display: flex; gap: 0.8rem; overflow-x: auto; padding-bottom: 0.5rem;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

.recent-item {
  flex-shrink: 0;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 0.7rem 1.1rem;
  cursor: pointer; transition: all 0.25s; white-space: nowrap;
  font-size: 0.85rem; color: var(--text-dim); font-weight: 600;
  max-width: 180px; overflow: hidden; text-overflow: ellipsis;
}

.recent-item:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-soft); transform: translateY(-3px);
}

/* ── CONTROLS ROW ── */
.controls-row {
  max-width: 1440px; margin: 0 auto;
  padding: 0.5rem 2rem 1.5rem;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}

.filters { display: flex; gap: 0.6rem; flex-wrap: wrap; flex: 1; }

.filter-btn {
  padding: 0.55rem 1.2rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text-muted); border-radius: 8px;
  cursor: pointer; font-family: var(--font); font-weight: 600;
  font-size: 0.88rem; transition: all 0.25s;
}

.filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

.filter-btn.active {
  background: var(--accent); border-color: var(--accent);
  color: #060d1a; box-shadow: 0 4px 16px var(--accent-glow);
}

.fav-filter-btn {
  padding: 0.55rem 1.1rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text-muted); border-radius: 8px;
  cursor: pointer; font-family: var(--font); font-weight: 600;
  font-size: 0.88rem; transition: all 0.25s; display: flex; align-items: center; gap: 0.4rem;
}

.fav-filter-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,197,24,0.08); }
.fav-filter-btn.active { background: var(--gold); border-color: var(--gold); color: #060d1a; }

.shuffle-btn {
  padding: 0.55rem 1.1rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text-muted); border-radius: 8px;
  cursor: pointer; font-family: var(--font); font-weight: 600;
  font-size: 0.88rem; transition: all 0.25s; display: flex; align-items: center; gap: 0.4rem;
}

.shuffle-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.shuffle-btn.spinning svg { animation: spin 0.5s ease; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── VIDEOS GRID ── */
.videos-section {
  max-width: 1440px; margin: 0 auto; padding: 0 2rem 4rem;
}

.results-count {
  font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.2rem;
}

.results-count span { color: var(--accent); font-weight: 700; }

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}

/* ── VIDEO CARD ── */
.video-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  border: 1.5px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s, border-color 0.3s;
  position: relative;
  animation: cardIn 0.5s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.video-card:hover {
  transform: translateY(-8px) scale(1.01);
  border-color: var(--border-accent);
  box-shadow: 0 20px 50px rgba(0,200,224,0.15), 0 0 0 1px var(--border-accent);
}

.thumb-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  background: var(--surface); overflow: hidden;
}

.thumb-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease, filter 0.4s;
}

.video-card:hover .thumb-wrap img {
  transform: scale(1.08); filter: brightness(0.75);
}

.play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
}

.video-card:hover .play-overlay { opacity: 1; }

.play-ring {
  width: 64px; height: 64px;
  border: 3px solid var(--accent);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  background: rgba(0,200,224,0.15);
  backdrop-filter: blur(4px);
  transform: scale(0.7); transition: transform 0.3s;
  box-shadow: 0 0 30px var(--accent-glow);
}

.video-card:hover .play-ring { transform: scale(1); }

.play-ring svg { width: 26px; height: 26px; color: var(--accent); margin-right: -3px; }

.live-badge {
  position: absolute; top: 10px; right: 10px;
  background: var(--live); color: #fff;
  padding: 0.3rem 0.7rem; border-radius: 6px;
  font-size: 0.7rem; font-weight: 800; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 0.3rem;
  animation: livePulse 2s ease-in-out infinite;
  box-shadow: 0 4px 12px rgba(255,62,62,0.4);
}

.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #fff; animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0; } }

@keyframes livePulse {
  0%,100% { box-shadow: 0 4px 12px rgba(255,62,62,0.4); }
  50%      { box-shadow: 0 4px 20px rgba(255,62,62,0.7); }
}

.view-badge {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.7); color: var(--text-dim);
  padding: 0.25rem 0.6rem; border-radius: 5px;
  font-size: 0.72rem; font-weight: 600;
  display: flex; align-items: center; gap: 0.3rem;
  backdrop-filter: blur(4px);
}

.card-body { padding: 1.2rem 1.2rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.6rem; }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }

.video-title {
  font-size: 1rem; font-weight: 700; color: var(--text);
  line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  transition: color 0.25s;
}

.video-card:hover .video-title { color: var(--accent); }

.fav-btn {
  flex-shrink: 0; background: none; border: none;
  cursor: pointer; font-size: 1.2rem; line-height: 1;
  transition: transform 0.3s; padding: 0.1rem;
  opacity: 0.5;
}

.fav-btn:hover { transform: scale(1.3); opacity: 1; }
.fav-btn.active { opacity: 1; animation: heartPop 0.4s ease; }

@keyframes heartPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.5); }
  100% { transform: scale(1); }
}

.card-meta { display: flex; gap: 0.8rem; align-items: center; }

.meta-tag {
  font-size: 0.73rem; color: var(--text-muted); font-weight: 600;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 0.2rem 0.5rem;
  display: flex; align-items: center; gap: 0.3rem;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 5rem 2rem; color: var(--text-muted);
  display: none;
}

.empty-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.4; }
.empty-state p { font-size: 1rem; }

/* ── FOOTER ── */
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 2rem; text-align: center; color: var(--text-muted);
  font-size: 0.85rem;
}

footer strong { color: var(--accent); }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(4,10,20,0.92);
  backdrop-filter: blur(12px); z-index: 2000;
  align-items: center; justify-content: center;
  padding: 1.5rem;
  animation: fadeOverlay 0.3s ease;
}

@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

.modal-overlay.show { display: flex; }

.modal-box {
  background: var(--card);
  border-radius: 18px; width: 100%; max-width: 920px; max-height: 90vh;
  overflow: hidden; border: 1.5px solid var(--border-accent);
  box-shadow: 0 30px 80px rgba(0,200,224,0.2);
  animation: modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; flex-direction: column;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-video-wrap {
  width: 100%; aspect-ratio: 16/9;
  background: #000; position: relative;
}

.modal-video-wrap iframe {
  width: 100%; height: 100%; border: none; display: block;
}

.modal-footer {
  padding: 1.5rem 1.8rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#modalTitle {
  font-size: 1.3rem; font-weight: 800; color: var(--text);
  flex: 1; line-height: 1.3;
}

.modal-close {
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text-muted);
  font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.25s; font-family: var(--font);
}

.modal-close:hover {
  background: var(--live); border-color: var(--live); color: #fff;
  transform: rotate(90deg);
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface); border: 1.5px solid var(--border-accent);
  color: var(--text); border-radius: 10px; padding: 0.8rem 1.5rem;
  font-size: 0.88rem; font-weight: 600; z-index: 3000;
  box-shadow: var(--shadow); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none; white-space: nowrap;
}

#toast.show { transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .nav-inner { flex-wrap: wrap; gap: 0.7rem; }
  .search-wrap { order: 3; min-width: 100%; }
  .hero { padding: 3rem 1.2rem 2.5rem; }
  .stats-row { gap: 1.5rem; }
  .controls-row, .recently-watched, .videos-section { padding-left: 1rem; padding-right: 1rem; }
  .video-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .modal-footer { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 480px) {
  .video-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 1.7rem; }
  .stats-row { gap: 1rem; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="logo" href="#">▶ Serag<span>Tube</span></a>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="ابحث عن فيديو..." autocomplete="off">
    </div>

    <div class="nav-actions">
      <button class="icon-btn" id="themeToggle" title="تبديل الوضع">🌙</button>
      <button class="scroll-top-btn" id="scrollTopBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
        أعلى
      </button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-grid-lines"></div>
  <div class="hero-badge">
    <span>📚</span> مكتبة تعليمية
  </div>
  <h1>فيديوهات مراجعات<br><em>الصف الأول ثانوي</em></h1>
  <p>أهم مراجعات الفصول لجيل 2009</p>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">فيديو</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="totalViews">0</div>
      <div class="stat-label">مشاهدة</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="favCount">0</div>
      <div class="stat-label">مفضلة</div>
    </div>
  </div>
</section>

<!-- RECENTLY WATCHED -->
<div class="recently-watched" id="recentSection" style="display:none">
  <div class="section-header">
    <h2 class="section-title"><span class="dot"></span> شوهدت مؤخراً</h2>
    <button class="clear-btn" onclick="clearRecent()">مسح الكل</button>
  </div>
  <div class="recent-scroll" id="recentVideos"></div>
</div>

<!-- CONTROLS -->
<div class="controls-row">
  <div class="filters" id="filtersGroup">
    <button class="filter-btn active" data-filter="all">جميع الفيديوهات</button>
    <button class="filter-btn" data-filter="featured">المميزة ⭐</button>
    <button class="filter-btn" data-filter="live">البث المباشر 🔴</button>
  </div>
  <button class="fav-filter-btn" id="favFilterBtn" onclick="toggleFavFilter()">
    ⭐ المفضلة
  </button>
  <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleNow()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    تشغيل عشوائي
  </button>
</div>

<!-- VIDEOS -->
<section class="videos-section">
  <div class="results-count" id="resultsCount"></div>
  <div class="video-grid" id="videoGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎬</div>
    <p>لم يتم العثور على فيديوهات</p>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2024 <strong>SeragTube</strong> — استمتع بأفضل تجربة تعليمية</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-video-wrap">
      <iframe id="modalIframe" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
    <div class="modal-footer">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────
const videos = [
  { id: 'vdt9NdvofR0', title: 'عرض الفيديوهات المميزة 01', type: 'featured', category: 'featured' },
  { id: 'KymqamdoDNU', title: 'مجموعة فيديوهات احترافية 01', type: 'video', category: 'featured' },
  { id: 'yV758ISxOOU', title: 'عرض تقديمي 01', type: 'video', category: 'all' },
  { id: 'iL6WhiLyxvY', title: 'عرض تقديمي 02', type: 'video', category: 'all' },
  { id: 'uuZ1tWMwwCE', title: 'عرض تقديمي 03', type: 'video', category: 'all' },
  { id: 'oQBTvE9cXI4', title: 'عرض تقديمي 04', type: 'video', category: 'all' },
  { id: 'QlXP4_2NoVw', title: 'عرض تقديمي 05', type: 'video', category: 'all' },
  { id: 'nBtG02s3US8', title: 'عرض تقديمي 06', type: 'video', category: 'all' },
  { id: 'N3aVqGNfPVg', title: 'عرض تقديمي 07', type: 'video', category: 'all' },
  { id: 'egOGt9nAliI', title: 'عرض تقديمي 08', type: 'video', category: 'all' },
  { id: 'lKyV52eUpAA', title: 'عرض تقديمي 09', type: 'video', category: 'all' },
  { id: 'tYlh-pTHKP4', title: 'بث مباشر 01', type: 'live', category: 'live' },
  { id: '5I65W9Yz_5o', title: 'بث مباشر 02', type: 'live', category: 'live' }
];

// ── STATE ─────────────────────────────────────────────────
let currentFilter = 'all';
let searchTerm = '';
let showFavOnly = false;
let shuffledOrder = [...videos];
let isShuffled = false;

const store = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) || null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

let recent   = store.get('st_recent')   || [];
let favs     = store.get('st_favs')     || [];
let views    = store.get('st_views')    || {};
let isDark   = store.get('st_theme') !== 'light';

// ── THEME ─────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
}

document.getElementById('themeToggle').onclick = () => {
  isDark = !isDark;
  store.set('st_theme', isDark ? 'dark' : 'light');
  applyTheme();
};

// ── SHUFFLE ───────────────────────────────────────────────
function shuffleNow() {
  shuffledOrder = [...videos].sort(() => Math.random() - 0.5);
  isShuffled = true;
  const btn = document.getElementById('shuffleBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 500);
  render();
  toast('تم الخلط عشوائياً 🔀');
}

// ── FAV FILTER ────────────────────────────────────────────
function toggleFavFilter() {
  showFavOnly = !showFavOnly;
  document.getElementById('favFilterBtn').classList.toggle('active', showFavOnly);
  render();
}

// ── RENDER ────────────────────────────────────────────────
function getFiltered() {
  const source = isShuffled ? shuffledOrder : videos;
  return source.filter(v => {
    if (showFavOnly && !favs.includes(v.id)) return false;
    if (currentFilter !== 'all' && v.category !== currentFilter) return false;
    if (searchTerm && !v.title.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  });
}

function render() {
  const grid  = document.getElementById('videoGrid');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('resultsCount');
  grid.innerHTML = '';

  const filtered = getFiltered();

  if (!filtered.length) {
    empty.style.display = 'block';
    count.textContent = '';
    return;
  }

  empty.style.display = 'none';
  count.innerHTML = `عرض <span>${filtered.length}</span> من ${videos.length} فيديو`;

  filtered.forEach((v, i) => {
    const isFav = favs.includes(v.id);
    const viewCount = views[v.id] || 0;
    const card = document.createElement('div');
    card.className = 'video-card';
    card.style.animationDelay = Math.min(i * 0.05, 0.5) + 's';
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="${v.title}" loading="lazy">
        <div class="play-overlay">
          <div class="play-ring">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        ${v.type === 'live' ? '<div class="live-badge"><span class="live-dot"></span>مباشر</div>' : ''}
        ${viewCount > 0 ? `<div class="view-badge">👁 ${viewCount.toLocaleString('ar')}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-top">
          <h3 class="video-title">${v.title}</h3>
          <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${v.id}" title="${isFav ? 'إزالة من المفضلة' : 'إضافة للمفضلة'}">
            ${isFav ? '⭐' : '☆'}
          </button>
        </div>
        <div class="card-meta">
          <span class="meta-tag">${v.type === 'live' ? '🔴 بث مباشر' : '🎬 فيديو'}</span>
          ${v.category === 'featured' ? '<span class="meta-tag">⭐ مميز</span>' : ''}
        </div>
      </div>
    `;

    card.querySelector('.fav-btn').onclick = e => { e.stopPropagation(); toggleFav(v.id); };
    card.onclick = () => openModal(v.id, v.title);
    grid.appendChild(card);
  });

  updateStats();
}

// ── RECENTLY WATCHED ──────────────────────────────────────
function renderRecent() {
  const wrap = document.getElementById('recentVideos');
  const sec  = document.getElementById('recentSection');
  wrap.innerHTML = '';
  if (!recent.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  recent.slice(0, 8).forEach(id => {
    const v = videos.find(x => x.id === id);
    if (!v) return;
    const el = document.createElement('div');
    el.className = 'recent-item';
    el.textContent = v.title;
    el.onclick = () => openModal(v.id, v.title);
    wrap.appendChild(el);
  });
}

function clearRecent() {
  recent = [];
  store.set('st_recent', recent);
  renderRecent();
  toast('تم مسح السجل 🗑️');
}

// ── FAVORITES ─────────────────────────────────────────────
function toggleFav(id) {
  if (favs.includes(id)) {
    favs = favs.filter(x => x !== id);
    toast('تم الإزالة من المفضلة');
  } else {
    favs.unshift(id);
    toast('تمت الإضافة للمفضلة ⭐');
  }
  store.set('st_favs', favs);
  render();
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(id, title) {
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${id}?rel=0&autoplay=1&modestbranding=1`;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';

  // View count
  views[id] = (views[id] || 0) + 1;
  store.set('st_views', views);

  // Recent
  recent = [id, ...recent.filter(x => x !== id)].slice(0, 10);
  store.set('st_recent', recent);

  renderRecent();
  render();
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modalIframe').src = '';
  document.body.style.overflow = '';
}

document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── FILTERS ───────────────────────────────────────────────
document.getElementById('filtersGroup').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  if (showFavOnly) { showFavOnly = false; document.getElementById('favFilterBtn').classList.remove('active'); }
  isShuffled = false;
  render();
});

// ── SEARCH ────────────────────────────────────────────────
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchTerm = e.target.value; render(); }, 200);
});

// ── SCROLL TOP ────────────────────────────────────────────
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollBtn.style.display = window.pageYOffset > 400 ? 'flex' : 'none';
});
scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  document.getElementById('totalCount').textContent = videos.length;
  const totalV = Object.values(views).reduce((a, b) => a + b, 0);
  document.getElementById('totalViews').textContent = totalV > 999 ? (totalV/1000).toFixed(1)+'k' : totalV;
  document.getElementById('favCount').textContent = favs.length;
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────
applyTheme();
render();
renderRecent();
updateStats();
</script>
</body>
</html>
